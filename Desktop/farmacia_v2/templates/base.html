<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Farmacia{% endblock %} — FarmaSystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script>
    // CAMBIO: guard global de "sesión" (token).
    // Si no hay token, solo permitimos la pantalla de login.
    (() => {
      const token = localStorage.getItem('token');
      const path  = window.location.pathname;
      if (!token && path !== '/login/') window.location.replace('/login/');
    })();
  </script>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm" id="main-nav">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-capsule-pill me-2"></i>FarmaSystem</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/medicamentos/"><i class="bi bi-box-seam me-1"></i>Medicamentos</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas/"><i class="bi bi-cart3 me-1"></i>Ventas</a></li>
        <li class="nav-item"><a class="nav-link" href="/alertas/"><i class="bi bi-exclamation-triangle me-1"></i>Alertas</a></li>
      </ul>
      <ul class="navbar-nav" id="nav-auth">
        <li class="nav-item"><a class="nav-link" href="/login/"><i class="bi bi-person me-1"></i>Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div id="alert-container"></div>
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Manejo global del token ──────────────────────────────────────
  const token    = localStorage.getItem('token');
  const username = localStorage.getItem('username');

  if (token) {
    document.getElementById('nav-auth').innerHTML = `
      <li class="nav-item"><span class="nav-link text-white-50"><i class="bi bi-person-check me-1"></i>${username}</span></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</a></li>`;
  } else {
    // CAMBIO: si no hay token, ocultamos la navegación para que solo se vea login.
    const nav = document.getElementById('main-nav');
    if (nav) nav.style.display = 'none';
  }

  function getHeaders() {
    const h = { 'Content-Type': 'application/json' };
    const t = localStorage.getItem('token');
    if (t) h['Authorization'] = `Token ${t}`;
    return h;
  }

  async function apiFetch(url, options = {}) {
    // CAMBIO: wrapper de fetch que adjunta Authorization y maneja 401 de forma centralizada.
    const headers = { ...getHeaders(), ...(options.headers || {}) };
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.replace('/login/');
      throw new Error('Unauthorized');
    }
    return res;
  }

  function showAlert(msg, type = 'success') {
    const div = document.getElementById('alert-container');
    div.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">
      ${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    setTimeout(() => { if (div.firstChild) div.innerHTML = ''; }, 4000);
  }

  async function cerrarSesion() {
    try {
      await apiFetch('/api/auth/logout/', { method: 'POST' });
    } finally {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login/';
    }
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
