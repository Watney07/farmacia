{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-success text-white fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" class="form-control" id="login-username" placeholder="usuario">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="login-password" placeholder="contraseña"
                 onkeydown="if(event.key==='Enter') hacerLogin()">
        </div>
        <button class="btn btn-success w-100" onclick="hacerLogin()">Entrar</button>
        <div class="form-text mt-2">
          Por seguridad, las cuentas se crean únicamente desde la terminal (administración).
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function hacerLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showAlert('Completa todos los campos.', 'warning');

  const res  = await fetch('/api/auth/login/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();

  if (res.ok) {
    localStorage.setItem('token',    data.token);
    localStorage.setItem('username', data.username);
    showAlert(`¡Bienvenido, ${data.username}!`);
    setTimeout(() => window.location.href = '/', 1000);
  } else {
    showAlert(data.error || 'Credenciales incorrectas.', 'danger');
  }
}
</script>
{% endblock %}
