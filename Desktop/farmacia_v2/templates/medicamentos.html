{% extends 'base.html' %}
{% block title %}Medicamentos{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="bi bi-box-seam me-2"></i>Medicamentos</h2>
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalMed" onclick="abrirCrear()">
    <i class="bi bi-plus-lg me-1"></i>Nuevo
  </button>
</div>

<div class="mb-3">
  <input type="text" class="form-control" id="buscar" placeholder="Buscar por nombre..." oninput="cargar()">
</div>

<div class="table-responsive">
  <table class="table table-hover bg-white rounded shadow-sm align-middle">
    <thead class="table-success">
      <!-- CAMBIO: agregamos columna de vencimiento para mostrar el próximo vencimiento del medicamento -->
      <tr><th>#</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Próx. venc.</th><th>Receta</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="8" class="text-center text-muted py-3">Cargando...</td></tr></tbody>
  </table>
</div>

<!-- Modal crear/editar -->
<div class="modal fade" id="modalMed" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modal-title">Nuevo Medicamento</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="med-id">
        <input type="hidden" id="lote-id">
        <div class="mb-3">
          <label class="form-label">Nombre *</label>
          <input type="text" class="form-control" id="med-nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Descripción *</label>
          <textarea class="form-control" id="med-desc" rows="2" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Precio unitario (COP) *</label>
          <input type="number" class="form-control" id="med-precio" min="1" step="100" required>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="med-receta">
          <label class="form-check-label">Requiere receta médica</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="med-activo" checked>
          <label class="form-check-label">Activo</label>
        </div>

        <hr>
        <h6 class="mb-3">
          <i class="bi bi-box2-heart me-2"></i>Stock y vencimiento (Lote)
        </h6>
        <!-- CAMBIO: permitimos ajustar stock (cantidad_disponible) y fecha_vencimiento desde esta pantalla -->
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Nº Lote *</label>
            <input type="text" class="form-control" id="lote-numero" placeholder="Ej: L-001" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha de vencimiento *</label>
            <input type="date" class="form-control" id="lote-fecha" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Cantidad inicial *</label>
            <input type="number" class="form-control" id="lote-inicial" min="1" step="1" placeholder="Ej: 100" required>
            <div class="form-text">Obligatorio al crear el medicamento.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Stock actual</label>
            <input type="number" class="form-control" id="lote-stock" min="0" step="1" placeholder="Ej: 80">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancelar" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" id="btn-guardar" onclick="guardar()">Guardar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let modalMode = 'create'; // 'create' | 'review'

function setModalMode(mode) {
  modalMode = mode;
  const review = mode === 'review';

  const setReadOnly = (id, ro) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'TEXTAREA') { el.readOnly = ro; return; }
    if (el.tagName === 'INPUT') {
      if (el.type === 'checkbox' || el.type === 'date') { el.disabled = ro; return; }
      el.readOnly = ro;
    }
  };

  // Medicamento
  setReadOnly('med-nombre', review);
  setReadOnly('med-desc', review);
  setReadOnly('med-precio', review);
  setReadOnly('med-receta', review);
  setReadOnly('med-activo', review);

  // Lote
  setReadOnly('lote-numero', review);
  setReadOnly('lote-fecha', review);
  setReadOnly('lote-inicial', review);
  setReadOnly('lote-stock', review);

  document.getElementById('btn-guardar').classList.toggle('d-none', review);
  document.getElementById('btn-cancelar').textContent = review ? 'Cerrar' : 'Cancelar';
}

async function cargar() {
  // CAMBIO: apiFetch centraliza headers (token) + manejo de 401 (redirige a /login/)
  const q   = document.getElementById('buscar').value;
  const url = '/api/medicamentos/' + (q ? `?nombre=${encodeURIComponent(q)}` : '');
  const res = await apiFetch(url);
  const json = await res.json();
  // DRF pagina: { results: [...] } o directamente array
  const data = json.results ?? json;
  const tbody = document.getElementById('tbody');

  if (!data.length) {
    // CAMBIO: el colspan ahora es 8 por la nueva columna "Próx. venc."
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Sin resultados.</td></tr>';
    return;
  }

  // Activos primero; inactivos al final.
  data.sort((a, b) => {
    if (a.activo === b.activo) {
      return (a.nombre ?? '').localeCompare((b.nombre ?? ''), 'es', { sensitivity: 'base' });
    }
    return a.activo ? -1 : 1;
  });

  tbody.innerHTML = data.map(m => `
    <tr class="${m.activo ? '' : 'table-light text-muted'}">
      <td>${m.id}</td>
      <td><strong>${m.nombre}</strong></td>
      <td>$${Number(m.precio_unitario).toLocaleString('es-CO')}</td>
      <td>
        <span class="badge ${m.stock_bajo ? 'bg-danger' : 'bg-success'}">${m.stock_total} uds</span>
        ${m.lotes_por_vencer_count > 0
          ? `<span class="badge bg-warning text-dark ms-1"><i class="bi bi-clock"></i> ${m.lotes_por_vencer_count} lote(s)</span>`
          : ''}
      </td>
      <!-- CAMBIO: mostrar próximo vencimiento (viene de MedicamentoSerializer.proximo_vencimiento) -->
      <td class="small">${m.proximo_vencimiento ? m.proximo_vencimiento : '<span class="text-muted">—</span>'}</td>
      <td>${m.requiere_receta ? '<span class="badge bg-info text-dark">Sí</span>' : 'No'}</td>
      <td>${m.activo
            ? '<span class="badge bg-success">Activo</span>'
            : '<span class="badge bg-secondary">Inactivo</span>'}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary" onclick="abrirRevision(${m.id})" title="Revisar"><i class="bi bi-eye"></i></button>
        ${m.activo
          ? `<button class="btn btn-sm btn-outline-warning ms-1" onclick="inactivar(${m.id})" title="Inactivar"><i class="bi bi-slash-circle"></i></button>`
          : `<button class="btn btn-sm btn-outline-secondary ms-1" disabled title="Inactivo"><i class="bi bi-slash-circle"></i></button>`}
        <button class="btn btn-sm btn-outline-danger ms-1" onclick="eliminar(${m.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

function limpiarModal() {
  ['med-nombre','med-desc','med-precio'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('med-receta').checked = false;
  document.getElementById('med-activo').checked  = true;
  document.getElementById('med-id').value = '';
  // CAMBIO: limpiar campos del lote (stock/vencimiento)
  document.getElementById('lote-id').value = '';
  document.getElementById('lote-numero').value = '';
  document.getElementById('lote-fecha').value = '';
  document.getElementById('lote-inicial').value = '';
  document.getElementById('lote-stock').value = '';
}

function abrirCrear() {
  setModalMode('create');
  document.getElementById('modal-title').textContent = 'Nuevo Medicamento';
  limpiarModal();
  // CAMBIO: por defecto, al crear se asume que se creará un lote inicial si se llenan los campos.
}

async function abrirRevision(id) {
  setModalMode('review');
  const res = await apiFetch(`/api/medicamentos/${id}/`);
  const m   = await res.json();
  document.getElementById('modal-title').textContent  = 'Revisión de Medicamento';
  document.getElementById('med-nombre').value         = m.nombre;
  document.getElementById('med-desc').value           = m.descripcion;
  document.getElementById('med-precio').value         = m.precio_unitario;
  document.getElementById('med-receta').checked       = m.requiere_receta;
  document.getElementById('med-activo').checked       = m.activo;

  // CAMBIO: en revisión, cargamos un lote (si existe) para mostrar stock/vencimiento.
  // Tomamos el primer lote no vencido del medicamento (ordenado por vencimiento).
  try {
    const rL = await apiFetch(`/api/lotes/?medicamento=${id}&vencidos=false`);
    const jL = await rL.json();
    const lotes = jL.results ?? jL;
    const lote = Array.isArray(lotes) && lotes.length ? lotes[0] : null;

    document.getElementById('lote-id').value     = lote?.id ?? '';
    document.getElementById('lote-numero').value = lote?.numero_lote ?? '';
    document.getElementById('lote-fecha').value  = lote?.fecha_vencimiento ?? '';
    document.getElementById('lote-inicial').value = lote?.cantidad_inicial ?? '';
    document.getElementById('lote-stock').value  = (lote?.cantidad_disponible ?? '').toString();
  } catch (e) {
    console.error(e);
  }

  new bootstrap.Modal(document.getElementById('modalMed')).show();
}

async function guardar() {
  if (modalMode !== 'create') return;

  const body = {
    nombre:          document.getElementById('med-nombre').value.trim(),
    descripcion:     document.getElementById('med-desc').value.trim(),
    precio_unitario: document.getElementById('med-precio').value,
    requiere_receta: document.getElementById('med-receta').checked,
    activo:          document.getElementById('med-activo').checked,
  };

  const numero  = document.getElementById('lote-numero').value.trim();
  const fecha   = document.getElementById('lote-fecha').value;
  const inicial = document.getElementById('lote-inicial').value;
  const stock   = document.getElementById('lote-stock').value;

  if (!body.nombre) return showAlert('El nombre es obligatorio.', 'warning');
  if (!body.descripcion) return showAlert('La descripción es obligatoria.', 'warning');
  if (!body.precio_unitario) return showAlert('El precio unitario es obligatorio.', 'warning');
  if (!numero) return showAlert('El Nº de lote es obligatorio.', 'warning');
  if (!fecha) return showAlert('La fecha de vencimiento es obligatoria.', 'warning');
  if (inicial === '') return showAlert('La cantidad inicial es obligatoria.', 'warning');

  const cantidadInicial = parseInt(inicial, 10);
  if (!Number.isFinite(cantidadInicial) || cantidadInicial < 1) {
    return showAlert('La cantidad inicial debe ser un número mayor o igual a 1.', 'warning');
  }
  const cantidadStock = stock !== '' ? parseInt(stock, 10) : cantidadInicial;
  if (!Number.isFinite(cantidadStock) || cantidadStock < 0) {
    return showAlert('El stock actual debe ser un número mayor o igual a 0.', 'warning');
  }

  const res    = await apiFetch('/api/medicamentos/', { method: 'POST', body: JSON.stringify(body) });
  const data   = await res.json();

  if (res.ok) {
    // Luego de crear el medicamento, creamos el lote inicial (obligatorio).
    const medId = data.id;
    try {
      await apiFetch('/api/lotes/', {
        method: 'POST',
        body: JSON.stringify({
          medicamento: medId,
          numero_lote: numero,
          fecha_vencimiento: fecha,
          cantidad_inicial: cantidadInicial,
          cantidad_disponible: cantidadStock,
        }),
      });
    } catch (e) {
      console.error(e);
      showAlert('Medicamento creado, pero hubo un error creando el lote inicial.', 'warning');
    }

    bootstrap.Modal.getInstance(document.getElementById('modalMed')).hide();
    showAlert('Medicamento creado.');
    cargar();
  } else {
    const msg = Object.entries(data).map(([k,v]) => `${k}: ${v}`).join(' | ');
    showAlert(msg, 'danger');
  }
}

async function showApiError(res, fallback) {
  let msg = fallback;
  try {
    const data = await res.clone().json();
    msg = data.detail ?? Object.entries(data).map(([k, v]) => `${k}: ${v}`).join(' | ') ?? msg;
  } catch (e) {}
  if (msg === fallback) {
    try {
      const text = (await res.clone().text()).trim();
      if (text) msg = text;
    } catch (e) {}
  }
  showAlert(msg, 'danger');
}

async function inactivar(id) {
  if (!confirm('¿Inactivar este medicamento?')) return;
  const res = await apiFetch(`/api/medicamentos/${id}/`, {
    method: 'PATCH',
    body: JSON.stringify({ activo: false }),
  });
  if (res.ok) { showAlert('Medicamento inactivado.'); cargar(); }
  else await showApiError(res, 'No se pudo inactivar.');
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este medicamento?')) return;
  const res = await apiFetch(`/api/medicamentos/${id}/`, { method: 'DELETE' });
  if (res.ok) { showAlert('Medicamento eliminado.'); cargar(); }
  else await showApiError(res, 'No se pudo eliminar.');
}

document.addEventListener('DOMContentLoaded', cargar);
</script>
{% endblock %}
